anvil: "1.0"

service:
  name: linear-tools
  version: "1.0.0"
  description: Linear project management tools for AI agents
  base_url: https://api.linear.app
  auth:
    type: bearer
    env_var: LINEAR_API_KEY
  default_permissions:
    - type: network
      target: api.linear.app
  tags: [linear, project-management, issues]

tools:
  create_issue:
    description: Create a new issue in Linear
    agent:
      description: |
        Create a Linear issue in a specific team. Can set title, description,
        priority, labels, and assignee. Returns the issue identifier and URL.
      when_to_use:
        - User wants to create a task or bug in Linear
        - Agent identifies work that should be tracked
      tips:
        - Priority 1 = urgent, 2 = high, 3 = medium, 4 = low
        - Use markdown in the description
        - team_id is required — list teams first if unknown
    parameters:
      team_id:
        type: string
        required: true
        description: Linear team ID
      title:
        type: string
        required: true
        description: Issue title
      description:
        type: string
        description: Issue description (markdown)
      priority:
        type: integer
        description: Priority (0=none, 1=urgent, 2=high, 3=medium, 4=low)
        validation:
          minimum: 0
          maximum: 4
      assignee_id:
        type: string
        description: Assignee user ID
      label_ids:
        type: array
        items:
          type: string
        description: Label IDs to apply
    returns:
      type: object
      properties:
        id:
          type: string
          description: Issue ID
        identifier:
          type: string
          description: Issue identifier (e.g., ENG-123)
        url:
          type: string
          description: URL to the issue in Linear
    side_effects: write
    cost: free
    examples:
      - name: create_bug
        input:
          team_id: "team_abc123"
          title: "Fix login timeout on mobile"
          description: "Users on iOS are experiencing 30s timeouts during login."
          priority: 2
        output:
          id: "issue_xyz"
          identifier: "ENG-456"
          url: "https://linear.app/team/issue/ENG-456"
        prompt: "Create a high priority bug for login timeout on mobile"

  search_issues:
    description: Search for issues across Linear
    agent:
      description: |
        Search Linear issues by text query, status, assignee, or team.
        Returns matching issues with identifiers, titles, and status.
      when_to_use:
        - User asks about existing tickets
        - Agent needs to find related issues
    parameters:
      query:
        type: string
        required: true
        description: Search text
      status:
        type: enum
        values: [backlog, todo, in_progress, done, cancelled]
        description: Filter by status
      team_id:
        type: string
        description: Filter by team
      limit:
        type: integer
        default: 10
        validation:
          minimum: 1
          maximum: 50
    returns:
      type: object
      properties:
        issues:
          type: array
          items:
            type: object
            properties:
              identifier:
                type: string
              title:
                type: string
              status:
                type: string
              priority:
                type: integer
              assignee:
                type: string
              url:
                type: string
    side_effects: read
    cost: free
    idempotent: true
    cache:
      ttl: 30
    examples:
      - name: find_bugs
        input:
          query: "login timeout"
          status: in_progress
        prompt: "Find in-progress issues about login timeout"
